---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: cilium
  namespace: kube-system
spec:
  interval: 15m
  url: https://helm.cilium.io/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  interval: 15m
  releaseName: cilium
  chart:
    spec:
      chart: cilium
      version: 1.19.2
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: kube-system
---
