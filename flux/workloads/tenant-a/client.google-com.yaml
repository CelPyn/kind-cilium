apiVersion: apps/v1
kind: Deployment
metadata:
  name: client-google-com
  labels:
    app: client-google-com
spec:
  replicas: 1
  selector:
    matchLabels:
      app: client-google-com
  template:
    metadata:
      name: client-google-com
      labels:
        app: client-google-com
    spec:
      containers:
        - name: client
          image: client:latest
          imagePullPolicy: Never
          env:
            - name: DESTINATION
              value: "https://google.com"
          resources: {}
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /readiness
              port: http
            initialDelaySeconds: 3
            periodSeconds: 3
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /liveness
              port: http
            initialDelaySeconds: 3
            periodSeconds: 3
            timeoutSeconds: 3
      restartPolicy: Always
